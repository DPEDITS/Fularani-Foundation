<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fularani Foundation</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register Service Worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((error) => {
              console.log('SW registration failed: ', error);
            });
        });
      }

      // Offline detection — redirect to cached offline page
      // 1. If already offline when page loads
      if (!navigator.onLine && !window.location.pathname.includes('offline')) {
        window.location.href = '/offline.html';
      }
      // 2. If internet drops while user is browsing
      window.addEventListener('offline', () => {
        if (!window.location.pathname.includes('offline')) {
          window.location.href = '/offline.html';
        }
      });
    </script>
  </body>
</html>
